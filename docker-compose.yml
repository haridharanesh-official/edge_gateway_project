
version: '3.8'
services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf

  edge-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      - mosquitto
    volumes:
      - ./data:/app/data
